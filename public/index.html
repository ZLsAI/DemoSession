<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px;
      color: #2d3748;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    /* Total Card */
    .total-card {
      background: linear-gradient(135deg, #2b6cb0, #3182ce);
      color: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 28px;
      box-shadow: 0 4px 16px rgba(43, 108, 176, 0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .total-card .label {
      font-size: 1rem;
      opacity: 0.85;
      font-weight: 500;
    }

    .total-card .amount {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    /* Form Card */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .form-card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: #2d3748;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #4a5568;
    }

    input, select {
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #2d3748;
      background: #f7fafc;
      transition: border-color 0.2s;
      outline: none;
      width: 100%;
    }

    input:focus, select:focus {
      border-color: #3182ce;
      background: #fff;
    }

    .btn-add {
      width: 100%;
      padding: 12px;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-add:hover {
      background: #2c5282;
    }

    .btn-add:active {
      transform: scale(0.98);
    }

    /* Error message */
    .error-msg {
      color: #c53030;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    /* Expenses list */
    .expenses-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .expenses-card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: #2d3748;
    }

    .empty-state {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .expense-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .expense-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 8px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      gap: 12px;
    }

    .expense-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .category-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-food       { background: #fefcbf; color: #744210; }
    .badge-transport  { background: #bee3f8; color: #1a365d; }
    .badge-entertainment { background: #e9d8fd; color: #44337a; }
    .badge-other      { background: #e2e8f0; color: #2d3748; }

    .expense-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: #2d3748;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expense-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .expense-amount {
      font-size: 1rem;
      font-weight: 700;
      color: #2b6cb0;
      white-space: nowrap;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #fc8181;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .btn-delete:hover {
      color: #c53030;
    }

    @media (max-width: 500px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .total-card .amount {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>

    <!-- Total -->
    <div class="total-card">
      <span class="label">Total Expenses</span>
      <span class="amount" id="total-amount">$0.00</span>
    </div>

    <!-- Add Expense Form -->
    <div class="form-card">
      <h2>Add New Expense</h2>
      <form id="expense-form" novalidate>
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="e.g. Lunch, Bus ticket..." maxlength="100">
          </div>
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="food">Food</option>
              <option value="transport">Transport</option>
              <option value="entertainment">Entertainment</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <p class="error-msg" id="error-msg"></p>
        <button type="submit" class="btn-add">+ Add Expense</button>
      </form>
    </div>

    <!-- Expenses List -->
    <div class="expenses-card">
      <h2>Expenses</h2>
      <p class="empty-state" id="empty-state">No expenses yet. Add one above!</p>
      <ul class="expense-list" id="expense-list"></ul>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = 'expense_tracker_items';

      // --- State ---
      let expenses = loadFromStorage();

      // --- DOM refs ---
      const form        = document.getElementById('expense-form');
      const titleInput  = document.getElementById('title');
      const amountInput = document.getElementById('amount');
      const categorySel = document.getElementById('category');
      const errorMsg    = document.getElementById('error-msg');
      const totalEl     = document.getElementById('total-amount');
      const listEl      = document.getElementById('expense-list');
      const emptyEl     = document.getElementById('empty-state');

      // --- Init ---
      render();

      // --- Event Listeners ---
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const title    = titleInput.value.trim();
        const amount   = parseFloat(amountInput.value);
        const category = categorySel.value;

        // Validation
        if (!title) {
          showError('Please enter a title for the expense.');
          titleInput.focus();
          return;
        }
        if (!amountInput.value || isNaN(amount) || amount <= 0) {
          showError('Please enter a valid amount greater than 0.');
          amountInput.focus();
          return;
        }

        hideError();

        const expense = {
          id: Date.now(),
          title,
          amount,
          category,
        };

        expenses.unshift(expense);
        saveToStorage();
        render();
        form.reset();
        titleInput.focus();
      });

      // --- Functions ---
      function render() {
        // Update total
        const total = expenses.reduce(function (sum, e) { return sum + e.amount; }, 0);
        totalEl.textContent = '$' + total.toFixed(2);

        // Update list
        listEl.innerHTML = '';

        if (expenses.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }

        emptyEl.style.display = 'none';

        expenses.forEach(function (expense) {
          const li = document.createElement('li');
          li.className = 'expense-item';
          li.dataset.id = expense.id;
          li.innerHTML =
            '<div class="expense-info">' +
              '<span class="category-badge badge-' + expense.category + '">' + expense.category + '</span>' +
              '<span class="expense-title">' + escapeHtml(expense.title) + '</span>' +
            '</div>' +
            '<div class="expense-right">' +
              '<span class="expense-amount">$' + expense.amount.toFixed(2) + '</span>' +
              '<button class="btn-delete" aria-label="Delete expense" data-id="' + expense.id + '">&#x2715;</button>' +
            '</div>';
          listEl.appendChild(li);
        });

        // Attach delete handlers
        listEl.querySelectorAll('.btn-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var id = parseInt(btn.dataset.id, 10);
            expenses = expenses.filter(function (e) { return e.id !== id; });
            saveToStorage();
            render();
          });
        });
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
      }

      function hideError() {
        errorMsg.style.display = 'none';
        errorMsg.textContent = '';
      }

      function escapeHtml(str) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }

      function loadFromStorage() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch (_) {
          return [];
        }
      }

      function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
      }
    })();
  </script>
</body>
</html>
